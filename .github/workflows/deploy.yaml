name: Deploy
run-name: "deploy: ${{ github.event_name == 'repository_dispatch' && github.event.action || 'update site' }}"

on:
  repository_dispatch:
  workflow_dispatch:

permissions:
  id-token: write
  pages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Checkout posts repository
        uses: actions/checkout@v6
        with:
          path: posts-repo
          repository: theTeamFuture/posts
          token: ${{ secrets.GH_PAT }}

      - name: Checkout time capsule repository
        uses: actions/checkout@v6
        with:
          path: time-capsules-repo
          repository: theTeamFuture/time-capsules
          token: ${{ secrets.GH_PAT }}

      - name: Setup PNPM
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/Krypton
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install

      - name: Build Astro
        run: |
          export SITE_REDIRECTS=$(cat posts-repo/redirect.json)
          pnpm run build

      - name: Create artifact
        run: |
          tar \
            --dereference --hard-dereference \
            --directory dist \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --force-local \
            "." \
            >/dev/null 2>&1

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

      - name: Deploy to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v5

      - name: Clean up artifacts
        if: always()
        uses: geekyeggo/delete-artifact@v6
        with:
          name: github-pages
